server:
  port: 8082
  servlet:
    context-path: /file

spring:
  application:
    name: file-service

  data:
    mongodb:
      uri: ${MONGO_FILE_URI:mongodb://root:root@localhost:27018/techstore-file?authSource=admin}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

app:
  file:
    storage-dir: ${FILE_STORAGE_DIR:D:/Luan_Van/app-data/uploads}
    download-prefix: ${FILE_DOWNLOAD_PREFIX:http://localhost:8888/techstore/api/v1/file/media/download/}