server:
  port: 8081
  servlet:
    context-path: /user

spring:
  application:
    name: user-service

  mvc:
    servlet:
      load-on-startup: 1

  datasource:
    url: ${DB_USER_URL:jdbc:mysql://localhost:3307/techstore_user}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  admin:
    email: ${ADMIN_EMAIL:admin@gmail.com}
    password: ${ADMIN_PASSWORD:admin}

  services:
    identity: ${IDENTITY_SERVICE_INTERNAL_URL:http://localhost:8080/identity}
    file: ${FILE_SERVICE_INTERNAL_URL:http://localhost:8082/file}
    notification: ${NOTIFICATION_SERVICE_INTERNAL_URL:http://localhost:8088/notification}