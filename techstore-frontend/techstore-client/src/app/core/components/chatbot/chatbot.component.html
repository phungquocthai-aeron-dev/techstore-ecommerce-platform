<!-- Floating Button -->
<button
  class="chat-trigger"
  (click)="toggleChat()"
  [class.open]="isOpen"
  title="Chat với AI"
>
  <span class="chat-trigger-icon">
    <i *ngIf="!isOpen" class="fa-solid fa-robot"></i>
    <i *ngIf="isOpen" class="fa-solid fa-x"></i>
  </span>
  <span class="chat-trigger-pulse" *ngIf="!isOpen"></span>
</button>

<!-- Chat Window -->
<div class="chatbot-window" [class.open]="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">
      <span>
        <i class="fa-solid fa-robot"></i>
      </span>
    </div>
    <div class="chat-info">
      <h4 class="chat-name">AI Assistant</h4>
      <span class="chat-status">
        <span class="status-dot"></span>
        Online
      </span>
    </div>
    <button class="chat-close" (click)="toggleChat()">✕</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" #messagesContainer>
    <div
      *ngFor="let msg of messages"
      class="message-row"
      [class.user-row]="msg.role === 'user'"
    >
      <div
        class="message-bubble"
        [class.user-bubble]="msg.role === 'user'"
        [class.bot-bubble]="msg.role === 'bot'"
      >
        {{ msg.content }}
      </div>
      <span class="message-time text-muted-custom">{{
        formatTime(msg.timestamp)
      }}</span>
    </div>

    <!-- Typing indicator -->
    <div class="message-row" *ngIf="isTyping">
      <div class="bot-bubble message-bubble typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Suggestions -->
  <div class="chat-suggestions" *ngIf="messages.length <= 2">
    <button
      *ngFor="let s of suggestions"
      class="suggestion-chip"
      (click)="sendSuggestion(s)"
    >
      {{ s }}
    </button>
  </div>

  <!-- Input -->
  <div class="chat-input-row">
    <textarea
      class="chat-input"
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      placeholder="Nhập tin nhắn..."
      rows="1"
    ></textarea>
    <button
      class="send-btn btn-primary-custom"
      (click)="sendMessage()"
      [disabled]="!inputText.trim()"
    >
      ➤
    </button>
  </div>
</div>
