<!-- Offcanvas Menu -->
<div class="offcanvas offcanvas-start mt-5 pt-4" tabindex="-1" id="menuCanvas">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Danh mục sản phẩm</h5>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="offcanvas"
    ></button>
  </div>
  <div class="offcanvas-body">
    <ul class="sidebar-nav">
      <li>
        <a routerLink="/home" routerLinkActive="active" class="nav-link"
          ><i class="bi bi-house"></i>Trang chủ</a
        >
      </li>
      <li>
        <a routerLink="/products" routerLinkActive="active" class="nav-link"
          ><i class="bi bi-laptop"></i>Laptop</a
        >
      </li>
      <li>
        <a href="#" class="nav-link"><i class="bi bi-phone"></i>Điện thoại</a>
      </li>
      <li>
        <a href="#" class="nav-link"><i class="bi bi-cpu"></i>Linh kiện PC</a>
      </li>
      <li>
        <a href="#" class="nav-link"
          ><i class="bi bi-headphones"></i>Gaming Gear</a
        >
      </li>
      <div class="sidebar-divider"></div>
      <li>
        <a href="#" class="nav-link"><i class="bi bi-tag"></i>Khuyến mãi</a>
      </li>
      <li>
        <a href="#" class="nav-link"
          ><i class="bi bi-info-circle"></i>Về chúng tôi</a
        >
      </li>
      <li>
        <a href="#" class="nav-link"><i class="bi bi-envelope"></i>Liên hệ</a>
      </li>
    </ul>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar shadow-sm fixed-top navbar-fixed-custom">
  <div class="container-fluid navbar-container">
    <div class="row w-100 align-items-center">
      <!-- Left: Menu + Search -->
      <div class="col-md-4 d-flex align-items-center gap-4">
        <button
          class="btn d-flex align-items-center"
          data-bs-toggle="offcanvas"
          data-bs-target="#menuCanvas"
        >
          <i class="bi bi-list fs-2 me-2"></i>
          <span>Menu</span>
        </button>

        <div class="position-relative w-100">
          <i class="bi bi-search search-icon fs-4" (click)="goSearch()"></i>
          <input
            type="text"
            class="form-control search-navbar ps-5"
            placeholder="Tìm sản phẩm..."
            [(ngModel)]="searchKeyword"
            (keydown.enter)="goSearch()"
          />
        </div>
      </div>

      <!-- Center: Logo -->
      <div class="col-md-4 text-center">
        <a routerLink="/">
          <img
            src="images/brand.png"
            style="width: 150px; margin-bottom: 12px"
            alt="TechStore"
        /></a>
      </div>

      <!-- Right: Actions -->
      <div class="col-md-4 d-flex justify-content-end align-items-center gap-3">
        <!-- Support -->
        <div
          class="d-flex align-items-center nav-support"
          style="cursor: pointer"
        >
          <i class="bi bi-headset fs-4 me-2"></i>
          <span>Hỗ trợ</span>
        </div>

        <!-- ── CHƯA ĐĂNG NHẬP ── -->
        <ng-container *ngIf="!isLoggedIn">
          <button class="btn-auth btn-auth--outline" (click)="goLogin()">
            Đăng nhập
          </button>
          <button class="btn-auth btn-auth--fill" (click)="goRegister()">
            Đăng ký
          </button>
        </ng-container>

        <!-- ── ĐÃ ĐĂNG NHẬP ── -->
        <ng-container *ngIf="isLoggedIn">
          <!-- Cart -->
          <a
            routerLink="/cart"
            class="d-flex align-items-center position-relative nav-icon-btn mx-3"
          >
            <i class="bi bi-bag fs-4"></i>
          </a>
          <div class="dropdown">
            <a
              href="#"
              class="d-flex align-items-center"
              data-bs-toggle="dropdown"
            >
              <img
                [src]="avatarUrl"
                (error)="handleImageError($event)"
                alt="Avatar"
                class="avatar-img"
              />
            </a>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-custom">
              <li class="dropdown-user-info">
                <img
                  [src]="avatarUrl"
                  (error)="handleImageError($event)"
                  alt="Avatar"
                  class="dropdown-avatar"
                />
                <div>
                  <p class="dropdown-username">
                    {{ customerName || "Tài khoản" }}
                  </p>
                </div>
              </li>
              <li><hr class="dropdown-divider dropdown-divider-custom" /></li>
              <li>
                <a
                  class="dropdown-item dropdown-item-custom"
                  (click)="goProfile()"
                >
                  <i class="bi bi-person-circle"></i> Hồ sơ cá nhân
                </a>
              </li>
              <li>
                <a
                  href="/orders"
                  class="dropdown-item dropdown-item-custom"
                  (click)="goOrders()"
                >
                  <i class="bi bi-bag-check"></i> Đơn hàng của tôi
                </a>
              </li>
              <li><hr class="dropdown-divider dropdown-divider-custom" /></li>
              <li>
                <a
                  class="dropdown-item dropdown-item-custom dropdown-item-danger"
                  (click)="handleLogout()"
                >
                  <i class="bi bi-box-arrow-right"></i> Đăng xuất
                </a>
              </li>
            </ul>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
