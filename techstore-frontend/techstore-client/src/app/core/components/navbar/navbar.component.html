<!-- Offcanvas Menu -->
<div class="offcanvas offcanvas-start mt-5 pt-4" tabindex="-1" id="menuCanvas">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Danh mục sản phẩm</h5>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="offcanvas"
    ></button>
  </div>

  <div class="offcanvas-body">
    <ul class="sidebar-nav">
      <li>
        <a href="#" class="nav-link active">
          <i class="bi bi-house"></i>
          Trang chủ
        </a>
      </li>
      <li>
        <a href="#products" class="nav-link">
          <i class="bi bi-laptop"></i>
          Laptop
        </a>
      </li>
      <li>
        <a href="#" class="nav-link">
          <i class="bi bi-phone"></i>
          Điện thoại
        </a>
      </li>
      <li>
        <a href="#" class="nav-link">
          <i class="bi bi-cpu"></i>
          Linh kiện PC
        </a>
      </li>
      <li>
        <a href="#" class="nav-link">
          <i class="bi bi-headphones"></i>
          Gaming Gear
        </a>
      </li>

      <div class="sidebar-divider"></div>

      <li>
        <a href="#" class="nav-link">
          <i class="bi bi-tag"></i>
          Khuyến mãi
        </a>
      </li>
      <li>
        <a href="#" class="nav-link">
          <i class="bi bi-info-circle"></i>
          Về chúng tôi
        </a>
      </li>
      <li>
        <a href="#" class="nav-link">
          <i class="bi bi-envelope"></i>
          Liên hệ
        </a>
      </li>
    </ul>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar shadow-sm fixed-top navbar-fixed-custom">
  <div class="container-fluid navbar-container">
    <div class="row w-100 align-items-center">
      <div class="col-md-4 d-flex align-items-center gap-4">
        <button
          class="btn d-flex align-items-center"
          data-bs-toggle="offcanvas"
          data-bs-target="#menuCanvas"
        >
          <i class="bi bi-list fs-2 me-2"></i>
          <span>Menu</span>
        </button>

        <!-- Input search thay cho div Tìm kiếm -->
        <div class="position-relative w-100">
          <i class="bi bi-search search-icon fs-4" (click)="goSearch()"></i>
          <input
            type="text"
            class="form-control search-navbar ps-5"
            placeholder="Tìm sản phẩm..."
            [(ngModel)]="searchKeyword"
            (keydown.enter)="goSearch()"
          />
          <div id="searchDropdown" class="search-dropdown d-none"></div>
        </div>
      </div>

      <div class="col-md-4 text-center">
        <img
          src="images/brand.png"
          style="width: 150px; margin-bottom: 12px"
          alt=""
        />
      </div>

      <div class="col-md-4 d-flex justify-content-end align-items-center gap-4">
        <div class="d-flex align-items-center" style="cursor: pointer">
          <i class="bi bi-headset fs-4 me-2"></i>
          <span>Hỗ trợ</span>
        </div>

        <a href="#" class="d-flex align-items-center position-relative">
          <i class="bi bi-bag fs-4"></i>
        </a>

        <div class="dropdown">
          <a
            href="#"
            class="d-flex align-items-center"
            data-bs-toggle="dropdown"
          >
            <img
              src="https://i.pravatar.cc/150?img=8"
              alt="Avatar"
              class="avatar-img"
            />
          </a>
          <ul
            class="dropdown-menu dropdown-menu-end"
            style="
              background: #111827;
              border: 1px solid rgba(56, 189, 248, 0.2);
            "
          >
            <li>
              <a class="dropdown-item" href="#" style="color: #e5e7eb"
                >Tài khoản</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="#" style="color: #e5e7eb"
                >Đơn hàng</a
              >
            </li>
            <li>
              <hr
                class="dropdown-divider"
                style="border-color: rgba(56, 189, 248, 0.2)"
              />
            </li>
            <li>
              <a class="dropdown-item" href="#" style="color: #ef4444"
                >Đăng xuất</a
              >
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
